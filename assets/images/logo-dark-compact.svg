<svg viewBox="0 0 420 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="railGrad" x1="10" y1="10" x2="70" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00dc8a"/>
      <stop offset="100%" stop-color="#00a5e0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="20" y1="5" x2="55" y2="75" gradientUnits="userSpaceOnUse">
